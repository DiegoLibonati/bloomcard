<!doctype html>

    <meta charset="UTF-8" />

    <title>Bloomcard</title>

    <meta
      name="description"
      content="Bloomcard is an interactive image gallery built entirely with vanilla TypeScript — no frameworks, no runtime dependencies. It presents a collection of full-height photo cards laid out side by side in a horizontal strip. Each card displays a background image and a title label. When the user clicks on a card, it smoothly expands to take up the majority of the available space while the remaining cards shrink down to slim vertical slivers, keeping the full gallery visible at all times."
    />
    <meta name="keywords" content="Bloomcard, bloomcard" />
    <meta name="author" content="Diego Libonati" />

    <meta property="og:title" content="Bloomcard" />

      property="og:description"
      content="Bloomcard is an interactive image gallery built entirely with vanilla TypeScript — no frameworks, no runtime dependencies. It presents a collection of full-height photo cards laid out side by side in a horizontal strip. Each card displays a background image and a title label. When the user clicks on a card, it smoothly expands to take up the majority of the available space while the remaining cards shrink down to slim vertical slivers, keeping the full gallery visible at all times."
